version: '3.8'

services:
  teamcast-ui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_ENV_NAME: ${NEXT_PUBLIC_ENV_NAME}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID}
        NEXT_PUBLIC_HUBSPOT_PORTAL_ID: ${NEXT_PUBLIC_HUBSPOT_PORTAL_ID}
        NEXT_PUBLIC_CACHE_MAX_AGE: ${NEXT_PUBLIC_CACHE_MAX_AGE}
        NEXT_PUBLIC_PROFILE_COMPLETION_THRESHOLD: ${NEXT_PUBLIC_PROFILE_COMPLETION_THRESHOLD}
        NEXT_PUBLIC_INTERNET_SPEED_THRESHOLD: ${NEXT_PUBLIC_INTERNET_SPEED_THRESHOLD}
        NEXT_PUBLIC_VIDEO_CHUNK_INTERVAL: ${NEXT_PUBLIC_VIDEO_CHUNK_INTERVAL}
        NEXT_PUBLIC_VIDEO_WIDTH: ${NEXT_PUBLIC_VIDEO_WIDTH}
        NEXT_PUBLIC_VIDEO_HEIGHT: ${NEXT_PUBLIC_VIDEO_HEIGHT}
        NEXT_PUBLIC_VIDEO_FRAME_RATE: ${NEXT_PUBLIC_VIDEO_FRAME_RATE}
        NEXT_PUBLIC_ASSESSMENT_TIME_WARNING_THRESHOLD: ${NEXT_PUBLIC_ASSESSMENT_TIME_WARNING_THRESHOLD}
        NEXT_PUBLIC_ASSESSMENT_HEARTBEAT_INTERVAL: ${NEXT_PUBLIC_ASSESSMENT_HEARTBEAT_INTERVAL}
        NEXT_PUBLIC_MIN_TEXT_ANSWER_LENGTH: ${NEXT_PUBLIC_MIN_TEXT_ANSWER_LENGTH}
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:3000/api/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Development service (optional)
  teamcast-ui-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN}
    ports:
      - '3001:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_ENV_NAME=${NEXT_PUBLIC_ENV_NAME}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL}
      - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME}
      - NEXT_PUBLIC_GA_MEASUREMENT_ID=${NEXT_PUBLIC_GA_MEASUREMENT_ID}
      - NEXT_PUBLIC_HUBSPOT_PORTAL_ID=${NEXT_PUBLIC_HUBSPOT_PORTAL_ID}
      - NEXT_PUBLIC_CACHE_MAX_AGE=${NEXT_PUBLIC_CACHE_MAX_AGE}
      - NEXT_PUBLIC_PROFILE_COMPLETION_THRESHOLD=${NEXT_PUBLIC_PROFILE_COMPLETION_THRESHOLD}
      - NEXT_PUBLIC_INTERNET_SPEED_THRESHOLD=${NEXT_PUBLIC_INTERNET_SPEED_THRESHOLD}
      - NEXT_PUBLIC_VIDEO_CHUNK_INTERVAL=${NEXT_PUBLIC_VIDEO_CHUNK_INTERVAL}
      - NEXT_PUBLIC_VIDEO_WIDTH=${NEXT_PUBLIC_VIDEO_WIDTH}
      - NEXT_PUBLIC_VIDEO_HEIGHT=${NEXT_PUBLIC_VIDEO_HEIGHT}
      - NEXT_PUBLIC_VIDEO_FRAME_RATE=${NEXT_PUBLIC_VIDEO_FRAME_RATE}
      - NEXT_PUBLIC_ASSESSMENT_TIME_WARNING_THRESHOLD=${NEXT_PUBLIC_ASSESSMENT_TIME_WARNING_THRESHOLD}
      - NEXT_PUBLIC_ASSESSMENT_HEARTBEAT_INTERVAL=${NEXT_PUBLIC_ASSESSMENT_HEARTBEAT_INTERVAL}
      - NEXT_PUBLIC_MIN_TEXT_ANSWER_LENGTH=${NEXT_PUBLIC_MIN_TEXT_ANSWER_LENGTH}
      - NEXT_CONVEX_SELF_HOSTED_URL=${NEXT_CONVEX_SELF_HOSTED_URL}
      - CONVEX_SELF_HOSTED_ADMIN_KEY=${CONVEX_SELF_HOSTED_ADMIN_KEY}
    profiles:
      - dev
