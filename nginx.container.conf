server {
    listen 80;
    server_name localhost;

    # Basic settings
    client_max_body_size 50M;
    
    # Timeout settings
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Don't intercept errors - let Next.js handle them
    proxy_intercept_errors off;

    location / {
        # Connect to Next.js running on localhost:3000 within the same container
        proxy_pass http://127.0.0.1:3000;
        
        # Essential headers for Next.js
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Disable proxy buffering for real-time features
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
        
        # Important: Don't intercept errors from Next.js
        proxy_intercept_errors off;
    }

    # Handle static assets efficiently
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, immutable";
        expires 1y;
    }

    # Handle API routes
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors off;
    }

    # Only handle nginx-level errors (when Next.js is completely unreachable)
    error_page 502 503 504 @nextjs_unavailable;
    
    location @nextjs_unavailable {
        return 503 '<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teamcast - Starting Up</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .container { 
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }
        .emoji { font-size: 4rem; margin-bottom: 1.5rem; }
        h1 { color: #2d3748; margin-bottom: 1rem; }
        p { color: #718096; line-height: 1.6; margin-bottom: 1rem; }
        .loading { 
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🚀</div>
        <h1>Teamcast is Starting Up</h1>
        <p>Our AI-powered hiring platform is initializing...</p>
        <p>Auto-refreshing<span class="loading"></span></p>
    </div>
    <script>
        setTimeout(() => window.location.reload(), 3000);
    </script>
</body>
</html>';
        add_header Content-Type text/html;
    }

    # Health check endpoint
    location /nginx-health {
        access_log off;
        return 200 "nginx is healthy\n";
        add_header Content-Type text/plain;
    }
} 